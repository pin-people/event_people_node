spec_version: "1.0.0"
implementation_version: "0.0.4"
language: typescript
package: "event_people (npm)"
status: stable

# Components fully implemented (with deviations/bugs noted separately)
implemented:
  - Config
  - Event
  - Listener
  - Emitter
  - Daemon
  - Context
  - BaseListener
  - ListenersManager
  - BaseBroker
  - RabbitBroker
  - RabbitContext
  - Topic
  - Queue

# Spec components not yet implemented (pending in spec too)
pending:
  - RetryManager
  - "Event.retryCount"
  - "Event.incrementRetryCount"
  - "Config.maxAttempts"
  - "Config.delayStrategy"
  - "Config.dlqName"
  - "Config.getRetryConfig"
  - "Listener.on (retry params: maxAttempts, delayStrategy, dlqName)"
  - "Context.maxRetries"
  - "Context.isLastRetry"
  - "RabbitContext.maxRetries"
  - "RabbitContext.isLastRetry"
  - "RabbitContext.dlqName"

# Structural or naming departures from the spec
deviations:
  - id: DEV-ND-001
    component: Queue
    file: "lib/broker/rabbit/queue.ts"
    severity: high
    description: >
      queueName() calls Event.fixedEventName(routingKey, 'all'), normalizing the destination
      segment to 'all' and producing queue names ending in .all
      (e.g. {appName}-resource.origin.action.all).
      Spec v2.0.0 requires the destination segment to be the consuming service's appName:
      {appName}-resource.origin.action.{appName}.
    fix: >
      Replace fixedEventName(routingKey, 'all') with fixedEventName(routingKey, Config.APP_NAME).
      Both routing keys (.all and .{appName}) must resolve to the same queue name.
