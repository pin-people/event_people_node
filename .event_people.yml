spec_version: "1.0.0"
implementation_version: "0.0.4"
language: typescript
package: "event_people (npm)"
status: stable

# Components fully implemented (with deviations/bugs noted separately)
implemented:
  - Config
  - Event
  - Listener
  - Emitter
  - Daemon
  - Context
  - BaseListener
  - ListenersManager
  - BaseBroker
  - RabbitBroker
  - RabbitContext
  - Topic
  - Queue

# Spec components not yet implemented (pending in spec too)
pending:
  - RetryManager
  - "Event.retryCount"
  - "Event.incrementRetryCount"
  - "Config.maxAttempts"
  - "Config.delayStrategy"
  - "Config.dlqName"
  - "Config.getRetryConfig"
  - "Listener.on (retry params: maxAttempts, delayStrategy, dlqName)"
  - "Context.maxRetries"
  - "Context.isLastRetry"
  - "RabbitContext.maxRetries"
  - "RabbitContext.isLastRetry"
  - "RabbitContext.dlqName"

# Structural or naming departures from the spec
deviations:
  - id: DEV-ND-001
    component: BaseListener
    description: >
      bindEvent() registers two queue subscriptions for 3-part event names: one with
      destination '.all' and one with destination '.{appName}'. The spec only defines
      the '.all' subscription for broadcast consumers. The extra '.{appName}' binding
      allows the service to also receive events directed specifically at it by name,
      which is a useful extension but not defined in the spec.
    spec_defines: "Single subscription with destination 'all'"
    implemented_as: "Dual subscription: '.all' + '.{appName}'"
    breaking: false

  - id: DEV-ND-002
    component: Event
    description: >
      Method is named fixedEventName() instead of fixName() (as used in Ruby and Go).
      TypeScript naming convention, no functional difference.
    spec_defines: "fixName()"
    implemented_as: "fixedEventName()"
    breaking: false
